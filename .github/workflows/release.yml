name: GitHub Release

on:
  workflow_run:
    workflows:
      - Lint & type-check
    types:
      - completed

jobs:
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download Android build metadata
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: test.yml
          run_id: ${{ github.event.workflow_run.id }}
          name: android-build-metadata

      - name: Download iOS build metadata
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: test.yml
          run_id: ${{ github.event.workflow_run.id }}
          name: ios-build-metadata

      - name: Read build metadata
        id: meta
        run: |
          echo "android-build-id=$(cat android-build-id.txt)" >> "$GITHUB_OUTPUT"
          echo "android-download-url=$(cat android-build-url.txt)" >> "$GITHUB_OUTPUT"
          echo "ios-build-id=$(cat ios-build-id.txt)" >> "$GITHUB_OUTPUT"
          echo "ios-download-url=$(cat ios-build-url.txt)" >> "$GITHUB_OUTPUT"
          echo "version=$(jq -r '.expo.version' app.json)" >> "$GITHUB_OUTPUT"

      - name: Download APK from EAS
        run: curl -L "${{ steps.meta.outputs.android-download-url }}" -o ./bac-app.apk

      - name: Download IPA from EAS
        run: curl -L "${{ steps.meta.outputs.ios-download-url }}" -o ./bac-app.ipa

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.meta.outputs.version }}-${{ github.run_number }}
          name: BAC App v${{ steps.meta.outputs.version }} (#${{ github.run_number }})
          body: |
            Automated release from commit ${{ github.event.workflow_run.head_sha }}.

            **Android:** download `bac-app.apk` and open it on your Android device (enable "Install from unknown sources" if prompted).

            **iOS:** download `bac-app.ipa` and install via TestFlight or [AltStore](https://altstore.io).

            EAS build IDs:
            - Android: `${{ steps.meta.outputs.android-build-id }}`
            - iOS: `${{ steps.meta.outputs.ios-build-id }}`
          files: |
            ./bac-app.apk
            ./bac-app.ipa
          generate_release_notes: true
