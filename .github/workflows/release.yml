name: GitHub Release

on:
  workflow_run:
    workflows:
      - Lint & type-check
    types:
      - completed

jobs:
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── Download build URLs (each platform is optional) ─────────────────
      - name: Download Android build metadata
        id: dl-android-meta
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: test.yml
          run_id: ${{ github.event.workflow_run.id }}
          name: android-build-metadata

      - name: Download iOS build metadata
        id: dl-ios-meta
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: test.yml
          run_id: ${{ github.event.workflow_run.id }}
          name: ios-build-metadata

      # ── Download the actual binaries ─────────────────────────────────────
      - name: Download APK from EAS
        id: dl-apk
        if: steps.dl-android-meta.outcome == 'success'
        continue-on-error: true
        run: |
          URL=$(cat android-build-url.txt)
          curl -fL "$URL" -o bac-app.apk
          echo "path=bac-app.apk" >> "$GITHUB_OUTPUT"

      - name: Download IPA from EAS
        id: dl-ipa
        if: steps.dl-ios-meta.outcome == 'success'
        continue-on-error: true
        run: |
          URL=$(cat ios-build-url.txt)
          curl -fL "$URL" -o bac-app.ipa
          echo "path=bac-app.ipa" >> "$GITHUB_OUTPUT"

      # ── Collect available release files ──────────────────────────────────
      - name: Collect release files
        id: files
        run: |
          FILES=""
          [ -f bac-app.apk ] && FILES="$FILES\n./bac-app.apk"
          [ -f bac-app.ipa ] && FILES="$FILES\n./bac-app.ipa"
          # Write to a file so the multiline value is safe for GITHUB_OUTPUT
          printf "%b" "$FILES" > release-files.txt
          echo "Release files: $(cat release-files.txt)"

      # ── Build release notes ───────────────────────────────────────────────
      - name: Build release body
        id: body
        run: |
          VERSION=$(jq -r '.expo.version' app.json)
          ANDROID_LINE=""
          IOS_LINE=""
          [ -f bac-app.apk ] && ANDROID_LINE="**Android:** download \`bac-app.apk\` and open it on your device (enable \"Install from unknown sources\" if prompted)."
          [ -f bac-app.ipa ] && IOS_LINE="**iOS:** download \`bac-app.ipa\` and install via TestFlight or [AltStore](https://altstore.io)."
          cat <<EOF > release-body.md
          Automated release from commit ${{ github.event.workflow_run.head_sha }}.

          $ANDROID_LINE
          $IOS_LINE
          EOF
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # ── Create the GitHub Release ─────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.body.outputs.version }}-${{ github.run_number }}
          name: BAC App v${{ steps.body.outputs.version }} (#${{ github.run_number }})
          body_path: release-body.md
          files: |
            ${{ steps.dl-apk.outputs.path }}
            ${{ steps.dl-ipa.outputs.path }}
          generate_release_notes: true
