name: Build Apps

on:
  push:
    branches:
      - master

jobs:
  # ── 1. Trigger both platform builds via EAS workflow ──────────────────────
  trigger:
    name: Trigger EAS workflow
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      triggered-at: ${{ steps.trigger.outputs.triggered-at }}
      new-version: ${{ steps.bump.outputs.new-version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bump patch version
        id: bump
        run: |
          VERSION=$(jq -r '.expo.version' app.json)
          NEW_VERSION=$(echo "$VERSION" | awk -F. '{$3+=1; print $1"."$2"."$3}')
          jq --arg v "$NEW_VERSION" '.expo.version = $v' app.json > app.json.tmp
          mv app.json.tmp app.json
          echo "Bumped: $VERSION → $NEW_VERSION"
          echo "new-version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new-version }} [skip ci]"
          git push

      - name: Set up EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Run EAS workflow (both platforms in parallel)
        id: trigger
        run: |
          echo "triggered-at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          npx eas-cli@latest workflow:run .eas/workflows/create-production-builds.yml \
            --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  # ── 2a. Wait for Android build (independent of iOS) ───────────────────────
  wait-android:
    name: Wait for Android build
    needs: trigger
    runs-on: ubuntu-latest
    continue-on-error: true   # iOS failure must not block Android release
    outputs:
      build-url: ${{ steps.poll.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Poll until Android build finishes
        id: poll
        run: |
          SINCE="${{ needs.trigger.outputs.triggered-at }}"
          echo "Waiting for Android build created after $SINCE …"
          for i in $(seq 1 40); do
            sleep 60
            BUILD=$(npx eas-cli@latest build:list \
              --platform android \
              --profile production \
              --limit 5 \
              --json \
              --non-interactive 2>/dev/null \
              | jq --arg t "$SINCE" \
                '[.[] | select(.createdAt >= $t)] | first // empty' \
              2>/dev/null || true)
            if [ -z "$BUILD" ] || [ "$BUILD" = "null" ]; then
              echo "Attempt $i/40: no build found yet…"
              continue
            fi
            STATUS=$(echo "$BUILD" | jq -r '.status')
            if [ "$STATUS" = "finished" ]; then
              URL=$(echo "$BUILD" | jq -r '.artifacts.applicationArchiveUrl // empty')
              if [ -n "$URL" ] && [ "$URL" != "null" ]; then
                echo "Android build ready: $URL"
                echo "$URL" > android-build-url.txt
                echo "url=$URL" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            elif [ "$STATUS" = "errored" ] || [ "$STATUS" = "cancelled" ]; then
              echo "Android build failed with status: $STATUS"
              exit 1
            else
              echo "Attempt $i/40: build status is '$STATUS', waiting…"
            fi
          done
          echo "Timed out waiting for Android build" && exit 1
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload Android build URL
        if: steps.poll.outputs.url != ''
        uses: actions/upload-artifact@v4
        with:
          name: android-build-metadata
          path: android-build-url.txt
          retention-days: 1

  # ── 2b. Wait for iOS build (independent of Android) ───────────────────────
  wait-ios:
    name: Wait for iOS build
    needs: trigger
    runs-on: ubuntu-latest
    continue-on-error: true   # Android failure must not block iOS release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Poll until iOS build finishes
        id: poll
        run: |
          SINCE="${{ needs.trigger.outputs.triggered-at }}"
          echo "Waiting for iOS build created after $SINCE …"
          for i in $(seq 1 40); do
            sleep 60
            BUILD=$(npx eas-cli@latest build:list \
              --platform ios \
              --profile production \
              --limit 5 \
              --json \
              --non-interactive 2>/dev/null \
              | jq --arg t "$SINCE" \
                '[.[] | select(.createdAt >= $t)] | first // empty' \
              2>/dev/null || true)
            if [ -z "$BUILD" ] || [ "$BUILD" = "null" ]; then
              echo "Attempt $i/40: no build found yet…"
              continue
            fi
            STATUS=$(echo "$BUILD" | jq -r '.status')
            if [ "$STATUS" = "finished" ]; then
              URL=$(echo "$BUILD" | jq -r '.artifacts.applicationArchiveUrl // empty')
              if [ -n "$URL" ] && [ "$URL" != "null" ]; then
                echo "iOS build ready: $URL"
                echo "$URL" > ios-build-url.txt
                echo "url=$URL" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            elif [ "$STATUS" = "errored" ] || [ "$STATUS" = "cancelled" ]; then
              echo "iOS build failed with status: $STATUS"
              exit 1
            else
              echo "Attempt $i/40: build status is '$STATUS', waiting…"
            fi
          done
          echo "Timed out waiting for iOS build" && exit 1
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload iOS build URL
        if: steps.poll.outputs.url != ''
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-metadata
          path: ios-build-url.txt
          retention-days: 1

  # ── 3. Submit Android build to Google Play ────────────────────────────────
  submit-android:
    name: Submit Android to Google Play
    needs: wait-android
    runs-on: ubuntu-latest
    if: ${{ needs.wait-android.outputs.build-url != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Write Google service account key
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
        run: |
          mkdir -p secrets
          echo "$GOOGLE_SERVICE_ACCOUNT_KEY" > secrets/bac-app-project-key.json

      - name: Submit to Google Play
        run: eas submit --platform android --profile production --latest --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  # ── 4. GitHub Release ─────────────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: [trigger, wait-android, wait-ios]
    runs-on: ubuntu-latest
    if: always() && needs.trigger.result == 'success'
    permissions:
      contents: write

    steps:
      - name: Download Android build metadata
        id: dl-android-meta
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: android-build-metadata

      - name: Download iOS build metadata
        id: dl-ios-meta
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: ios-build-metadata

      - name: Download APK from EAS
        id: dl-apk
        if: steps.dl-android-meta.outcome == 'success'
        continue-on-error: true
        run: |
          URL=$(cat android-build-url.txt)
          curl -fL "$URL" -o bac-app.apk
          echo "path=bac-app.apk" >> "$GITHUB_OUTPUT"

      - name: Download IPA from EAS
        id: dl-ipa
        if: steps.dl-ios-meta.outcome == 'success'
        continue-on-error: true
        run: |
          URL=$(cat ios-build-url.txt)
          curl -fL "$URL" -o bac-app.ipa
          echo "path=bac-app.ipa" >> "$GITHUB_OUTPUT"

      - name: Build release body
        id: body
        run: |
          ANDROID_LINE=""
          IOS_LINE=""
          [ -f bac-app.apk ] && ANDROID_LINE="**Android:** download \`bac-app.apk\` and open it on your device (enable \"Install from unknown sources\" if prompted)."
          [ -f bac-app.ipa ] && IOS_LINE="**iOS:** download \`bac-app.ipa\` and install via TestFlight or [AltStore](https://altstore.io)."
          cat > release-body.md << EOF
          Automated release from commit ${{ github.sha }}.

          ${ANDROID_LINE}
          ${IOS_LINE}
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.trigger.outputs.new-version }}-${{ github.run_number }}
          name: BAC App v${{ needs.trigger.outputs.new-version }} (#${{ github.run_number }})
          body_path: release-body.md
          files: |
            ${{ steps.dl-apk.outputs.path }}
            ${{ steps.dl-ipa.outputs.path }}
          generate_release_notes: true
