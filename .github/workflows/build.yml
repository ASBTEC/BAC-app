name: Build Apps

on:
  push:
    branches:
      - master

jobs:
  # ── 1. Trigger both platform builds via EAS workflow ──────────────────────
  trigger:
    name: Trigger EAS workflow
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      triggered-at: ${{ steps.trigger.outputs.triggered-at }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bump patch version
        id: bump
        run: |
          VERSION=$(jq -r '.expo.version' app.json)
          NEW_VERSION=$(echo "$VERSION" | awk -F. '{$3+=1; print $1"."$2"."$3}')
          jq --arg v "$NEW_VERSION" '.expo.version = $v' app.json > app.json.tmp
          mv app.json.tmp app.json
          echo "Bumped: $VERSION → $NEW_VERSION"
          echo "new-version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new-version }} [skip ci]"
          git push

      - name: Set up EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Run EAS workflow (both platforms in parallel)
        id: trigger
        run: |
          echo "triggered-at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          npx eas-cli@latest workflow:run .eas/workflows/create-production-builds.yml \
            --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  # ── 2a. Wait for Android build (independent of iOS) ───────────────────────
  wait-android:
    name: Wait for Android build
    needs: trigger
    runs-on: ubuntu-latest
    continue-on-error: true   # iOS failure must not block Android release
    outputs:
      build-url: ${{ steps.poll.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Poll until Android build finishes
        id: poll
        run: |
          SINCE="${{ needs.trigger.outputs.triggered-at }}"
          echo "Waiting for Android build created after $SINCE …"
          for i in $(seq 1 40); do
            sleep 60
            URL=$(npx eas-cli@latest build:list \
              --platform android \
              --profile production \
              --status finished \
              --limit 5 \
              --json \
              --non-interactive 2>/dev/null \
              | jq -r --arg t "$SINCE" \
                '[.[] | select(.createdAt >= $t)] | first | .artifacts.applicationArchiveUrl // empty' \
              2>/dev/null || true)
            if [ -n "$URL" ] && [ "$URL" != "null" ]; then
              echo "Android build ready: $URL"
              echo "$URL" > android-build-url.txt
              echo "url=$URL" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Attempt $i/40: not finished yet…"
          done
          echo "Timed out waiting for Android build" && exit 1
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload Android build URL
        if: steps.poll.outputs.url != ''
        uses: actions/upload-artifact@v4
        with:
          name: android-build-metadata
          path: android-build-url.txt
          retention-days: 1

  # ── 2b. Wait for iOS build (independent of Android) ───────────────────────
  wait-ios:
    name: Wait for iOS build
    needs: trigger
    runs-on: ubuntu-latest
    continue-on-error: true   # Android failure must not block iOS release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Poll until iOS build finishes
        id: poll
        run: |
          SINCE="${{ needs.trigger.outputs.triggered-at }}"
          echo "Waiting for iOS build created after $SINCE …"
          for i in $(seq 1 40); do
            sleep 60
            URL=$(npx eas-cli@latest build:list \
              --platform ios \
              --profile production \
              --status finished \
              --limit 5 \
              --json \
              --non-interactive 2>/dev/null \
              | jq -r --arg t "$SINCE" \
                '[.[] | select(.createdAt >= $t)] | first | .artifacts.applicationArchiveUrl // empty' \
              2>/dev/null || true)
            if [ -n "$URL" ] && [ "$URL" != "null" ]; then
              echo "iOS build ready: $URL"
              echo "$URL" > ios-build-url.txt
              echo "url=$URL" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Attempt $i/40: not finished yet…"
          done
          echo "Timed out waiting for iOS build" && exit 1
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload iOS build URL
        if: steps.poll.outputs.url != ''
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-metadata
          path: ios-build-url.txt
          retention-days: 1

  # ── 3. Submit Android build to Google Play ────────────────────────────────
  submit-android:
    name: Submit Android to Google Play
    needs: wait-android
    runs-on: ubuntu-latest
    if: ${{ needs.wait-android.outputs.build-url != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Write Google service account key
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
        run: |
          mkdir -p secrets
          echo "$GOOGLE_SERVICE_ACCOUNT_KEY" > secrets/bac-app-project-key.json

      - name: Submit to Google Play
        run: eas submit --platform android --profile production --latest --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
