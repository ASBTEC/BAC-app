name: Build APK

on:
  push:
    branches:
      - master

jobs:
  build:
    name: Build APK (EAS)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK on EAS
        id: eas-build
        run: |
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --json \
            | tee build-output.json
          BUILD_ID=$(jq -r '.[0].id' build-output.json)
          DOWNLOAD_URL=$(jq -r '.[0].artifacts.applicationArchiveUrl' build-output.json)
          echo "EAS build ID: $BUILD_ID"
          echo "Download URL: $DOWNLOAD_URL"
          echo "$BUILD_ID" > build-id.txt
          echo "$DOWNLOAD_URL" > build-url.txt
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload build metadata
        uses: actions/upload-artifact@v4
        with:
          name: build-metadata
          path: |
            build-id.txt
            build-url.txt
          retention-days: 1
