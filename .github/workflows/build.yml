name: Build Apps

on:
  push:
    branches:
      - master

jobs:
  build-android:
    name: Build Android APK (EAS)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK on EAS
        run: |
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --json \
            | tee build-android.json
          echo "$(jq -r '.[0].id' build-android.json)" > android-build-id.txt
          echo "$(jq -r '.[0].artifacts.applicationArchiveUrl' build-android.json)" > android-build-url.txt
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload Android build metadata
        uses: actions/upload-artifact@v4
        with:
          name: android-build-metadata
          path: |
            android-build-id.txt
            android-build-url.txt
          retention-days: 1

  build-ios:
    name: Build iOS IPA (EAS)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS IPA on EAS
        run: |
          eas build \
            --platform ios \
            --profile preview \
            --non-interactive \
            --json \
            | tee build-ios.json
          echo "$(jq -r '.[0].id' build-ios.json)" > ios-build-id.txt
          echo "$(jq -r '.[0].artifacts.applicationArchiveUrl' build-ios.json)" > ios-build-url.txt
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload iOS build metadata
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-metadata
          path: |
            ios-build-id.txt
            ios-build-url.txt
          retention-days: 1
