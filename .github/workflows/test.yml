name: Lint & type-check

on:
  workflow_run:
    workflows:
      - Build APK
    types:
      - completed

jobs:
  test:
    name: Lint & type-check
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Download build metadata from Build workflow
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build.yml
          run_id: ${{ github.event.workflow_run.id }}
          name: build-metadata

      - name: Re-upload build metadata for Release workflow
        uses: actions/upload-artifact@v4
        with:
          name: build-metadata
          path: build-id.txt
          retention-days: 1
