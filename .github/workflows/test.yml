name: Lint & type-check

on:
  workflow_run:
    workflows:
      - Build Apps
    types:
      - completed

jobs:
  test:
    name: Lint & type-check
    runs-on: ubuntu-latest
    # Run even if some build jobs failed (continue-on-error makes the workflow succeed)
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Download Android build metadata
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build.yml
          run_id: ${{ github.event.workflow_run.id }}
          name: android-build-metadata

      - name: Download iOS build metadata
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build.yml
          run_id: ${{ github.event.workflow_run.id }}
          name: ios-build-metadata

      - name: Re-upload Android build metadata
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: android-build-metadata
          path: android-build-url.txt
          retention-days: 1

      - name: Re-upload iOS build metadata
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-metadata
          path: ios-build-url.txt
          retention-days: 1
